events {}

http {
    # Shared memory zone used by limit_req. A low rate makes HTTP 429 easy to
    # trigger during the DDoS simulation.
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=10r/s;

    upstream flask_backend {
        server web-app-1:5000;
        server web-app-2:5000;
    }

    # JSON logs are easier for the rule-based classifier to parse reliably.
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name localhost;

        location = /unauthorized {
            return 401;
        }

        location = /forbidden {
            return 403;
        }

        location / {
            # burst allows short spikes; nodelay returns 429 immediately once
            # the rate plus burst are exceeded.
            limit_req zone=per_ip burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://flask_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name localhost;

        # SSL termination uses these placeholder/self-signed files for the
        # university demo. Replace them with real certificates in production.
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        location = /unauthorized {
            return 401;
        }

        location = /forbidden {
            return 403;
        }

        location / {
            limit_req zone=per_ip burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://flask_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
