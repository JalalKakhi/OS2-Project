# Apache reverse proxy / load balancer site for the OS2 project.
# Built into the image at /etc/apache2/sites-available/os2-proxy.conf and
# also bind-mounted by docker-compose so config edits don't need a rebuild.

# JSON logs are easier for the rule-based classifier to parse reliably.
# Apache escapes double quotes inside %r and %{...}i, so lines stay valid JSON.
LogFormat "{\"time\":\"%{%Y-%m-%dT%H:%M:%S%z}t\",\"remote_addr\":\"%a\",\"request\":\"%r\",\"status\":%>s,\"body_bytes_sent\":%B,\"request_time_ms\":%{ms}T,\"upstream_addr\":\"%{BALANCER_WORKER_NAME}e\",\"http_user_agent\":\"%{User-Agent}i\"}" json_combined

# Per-IP request rate limiting via ModSecurity. Every request increments a
# per-client-IP counter that decays by 5 per second; once more than 15 are
# outstanding Apache immediately returns HTTP 429 Too Many Requests. The low
# threshold makes 429s easy to trigger during the DDoS simulation.
<IfModule security2_module>
    SecAction "id:1001,phase:1,nolog,pass,initcol:ip=%{REMOTE_ADDR},setvar:ip.requests=+1,deprecatevar:ip.requests=5/1"
    SecRule IP:REQUESTS "@gt 15" "id:1002,phase:1,nolog,deny,status:429,msg:'Per-IP rate limit exceeded (DDoS-like traffic)'"
</IfModule>

# Round-robin load balancing across the two Flask instances. byrequests is
# mod_proxy_balancer's request-counting scheduler, so traffic is distributed
# evenly between the two members.
<Proxy "balancer://flask_backend">
    BalancerMember "http://web-app-1:5000"
    BalancerMember "http://web-app-2:5000"
    ProxySet lbmethod=byrequests
</Proxy>

<VirtualHost *:80>
    ServerName localhost
    CustomLog ${APACHE_LOG_DIR}/access.log json_combined

    # Security-alert demo endpoints: a real failed Basic-auth challenge (401)
    # and a real authorization denial (403) feed the classifier.
    <Location "/unauthorized">
        AuthType Basic
        AuthName "Restricted"
        AuthBasicProvider file
        AuthUserFile /dev/null
        Require valid-user
    </Location>
    <Location "/forbidden">
        Require all denied
    </Location>

    ProxyPreserveHost On
    ProxyPass "/unauthorized" "!"
    ProxyPass "/forbidden" "!"
    ProxyPass "/" "balancer://flask_backend/"
    ProxyPassReverse "/" "balancer://flask_backend/"
    RequestHeader set X-Real-IP "expr=%{REMOTE_ADDR}"
    RequestHeader set X-Forwarded-Proto "http"
</VirtualHost>

<VirtualHost *:443>
    ServerName localhost
    CustomLog ${APACHE_LOG_DIR}/access.log json_combined

    # SSL termination uses the project's self-signed certificate. Replace with
    # real certificates in production.
    SSLEngine on
    SSLCertificateFile /etc/apache2/certs/server.crt
    SSLCertificateKeyFile /etc/apache2/certs/server.key

    <Location "/unauthorized">
        AuthType Basic
        AuthName "Restricted"
        AuthBasicProvider file
        AuthUserFile /dev/null
        Require valid-user
    </Location>
    <Location "/forbidden">
        Require all denied
    </Location>

    ProxyPreserveHost On
    ProxyPass "/unauthorized" "!"
    ProxyPass "/forbidden" "!"
    ProxyPass "/" "balancer://flask_backend/"
    ProxyPassReverse "/" "balancer://flask_backend/"
    RequestHeader set X-Real-IP "expr=%{REMOTE_ADDR}"
    RequestHeader set X-Forwarded-Proto "https"
</VirtualHost>
